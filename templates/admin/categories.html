{% extends "base.html" %}
{% block title %}Categories - Admin{% endblock %}
{% block content %}
<div class="admin-header">
  <h1>Categories</h1>
  <a href="{{ url_for('admin.add_category') }}" class="btn btn-success">Add Category</a>
</div>

<table class="table">
  <thead><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
  <tbody>
    {% for cat in categories %}
      <tr>
        <td>{{ cat.name }}</td>
        <td>{{ cat.description or '' }}</td>
        <td class="actions">
          <a href="{{ url_for('admin.edit_category', cat_id=cat.id) }}" class="btn btn-sm">Edit</a>
          <form action="{{ url_for('admin.delete_category', cat_id=cat.id) }}" method="POST" style="display:inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this category?')">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
